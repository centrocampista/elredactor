services:
  postgres_red:
    image: postgres:16
    container_name: postgres_red
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}                                                                                                                  
    expose:
      - "5432"
    volumes:
      - postgres_red_data:/var/lib/postgresql/data


  elredactor:
    env_file:
      - .env
    depends_on:
      - postgres_red
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: always
    container_name: qdrant
    expose:
      - "6333"
      - "6334"
    environment:
      QDRANT_SERVICE_API_KEY: ${QDRANT_SERVICE_API_KEY}      
      QDRANT_SERVICE_READ_ONLY_API_KEY: ${QDRANT_SERVICE_READ_ONLY_API_KEY}
      QDRANT_LOG_LEVEL: INFO
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots   # backup snapshots
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G 

volumes:
  postgres_red_data:
  qdrant_data:
  qdrant_snapshots:
