services:
  postgres_red:
    image: postgres:16
    container_name: postgres_red
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_red_data:/var/lib/postgresql/data


  app:
    env_file:
      - .env
    depends_on:
      - postgres_red
      - qdrant

  qdrant:
    image: qdrant/qdrant:v1.13.6
    restart: always
    container_name: qdrant
    ports:
      - "${QDRANT_SERVICE_HTTP_PORT:-6333}:6333"
      - "${QDRANT_SERVICE_GRPC_PORT:-6334}:6334"
    environment:
      QDRANT_SERVICE_API_KEY: ${QDRANT_SERVICE_API_KEY}      
      QDRANT_SERVICE_READ_ONLY_API_KEY: ${QDRANT_SERVICE_READ_ONLY_API_KEY}
      QDRANT_LOG_LEVEL: INFO
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots   # backup snapshots
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G 

configs:
  qdrant_config:
    content: |
      log_level: INFO

volumes:
  postgres_red_data:
  qdrant_data:
  qdrant_snapshots:
