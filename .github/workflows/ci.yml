name: ElRedactor - CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
  
permissions:
  issues: write
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────
  # Lint & format (ruff)
  # ─────────────────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff - check
        run: uv run ruff check .

      - name: Ruff - format
        run: uv run ruff format --check .

  # ─────────────────────────────────────────────
  # Type checking (mypy)
  # ─────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: mypy
        run: uv run mypy app/

  # ─────────────────────────────────────────────
  # Unit tests (no external services)
  # ─────────────────────────────────────────────
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run unit tests
        run: uv run pytest tests/unit
        env:
          ENVIRONMENT: development
          DEBUG: "false"
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
          POSTGRES_PORT: "5432"
          QDRANT_SERVICE_API_KEY: test
          QDRANT_SERVICE_READ_ONLY_API_KEY: test
          QDRANT_SERVICE_HTTP_PORT: "6333"
          QDRANT_SERVICE_GRPC_PORT: "6334"

  # ─────────────────────────────────────────────
  # Integration tests (postgres + qdrant)
  # ─────────────────────────────────────────────
  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      qdrant:
        image: qdrant/qdrant:v1.13.6
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "bash -c 'exec 3<>/dev/tcp/localhost/6333'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      # TODO: restore when Alembic is configured and migrations are implemented
      # - name: Run DB migrations
      #   run: uv run alembic upgrade head
      #   env:
      #     ENVIRONMENT: test
      #     DEBUG: "false"
      #     POSTGRES_USER: test
      #     POSTGRES_PASSWORD: test
      #     POSTGRES_DB: test_db
      #     POSTGRES_PORT: "5432"
      #     QDRANT_SERVICE_API_KEY: test
      #     QDRANT_SERVICE_READ_ONLY_API_KEY: test
      #     QDRANT_SERVICE_HTTP_PORT: "6333"
      #     QDRANT_SERVICE_GRPC_PORT: "6334"

      - name: Run integration tests
        run: uv run pytest tests/integration
        env:
          ENVIRONMENT: development
          DEBUG: "false"
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
          POSTGRES_PORT: "5432"
          QDRANT_SERVICE_API_KEY: test
          QDRANT_SERVICE_READ_ONLY_API_KEY: test
          QDRANT_SERVICE_HTTP_PORT: "6333"
          QDRANT_SERVICE_GRPC_PORT: "6334"

  # ─────────────────────────────────────────────
  # Docker build check
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Create issue on CI failure
  # ─────────────────────────────────────────────
  report-failure:
    name: Report CI failure
    needs: [lint, typecheck, test-unit, test-integration, docker-build]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Ensure labels exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "ci-failure" \
            --color "d73a4a" \
            --description "CI pipeline failed" \
            --force

          gh label create "bug" \
            --color "ee0701" \
            --description "Something isn't working" \
            --force

          gh label create "branch-${{ github.ref_name }}" \
            --color "fbca04" \
            --description "Tracks CI issues for branch ${{ github.ref_name }}" \
            --force

      - name: Check for existing open issue
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(gh issue list \
            --label "branch-${{ github.ref_name }}" \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$ISSUE_NUMBER" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on existing issue
        if: steps.check.outputs.exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.check.outputs.number }}" \
            --body "CI failed again — run #${{ github.run_number }} on \`${{ github.sha }}\`. [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Create issue on CI failure
        if: steps.check.outputs.exists == 'false'
        uses: dacbd/create-issue-action@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "[elredactor]-${{ github.ref_name }}-#${{ github.run_number }}"
          body: |
            ## CI Failure

            | | |
            |---|---|
            | **Branch** | `${{ github.ref_name }}` |
            | **Commit** | `${{ github.sha }}` |
            | **Triggered by** | @${{ github.actor }} |
            | **Run** | [View logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            Check which jobs failed and fix the errors.
          labels: "ci-failure,bug,branch-${{ github.ref_name }}"

  # ─────────────────────────────────────────────
  # Auto PR → main (only on push to feature branch)
  # ─────────────────────────────────────────────
  create-pr:
    name: Create PR → main
    needs: [lint, typecheck, test-unit, test-integration, docker-build]
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      github.ref != 'refs/heads/main'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Create PR if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"

          EXISTING=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')

          if [ -n "$EXISTING" ]; then
            echo "PR #$EXISTING already exists for branch $BRANCH — skipping."
          else
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "$BRANCH" \
              --body "Automated PR — CI passed on branch \`$BRANCH\`."
            echo "PR created."
          fi
