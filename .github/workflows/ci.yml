name: ElRedactor - CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ─────────────────────────────────────────────
  # Lint & format (ruff)
  # ─────────────────────────────────────────────
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff - check
        run: uv run ruff check .

      - name: Ruff - format
        run: uv run ruff format --check .

  # ─────────────────────────────────────────────
  # Type checking (mypy)
  # ─────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: mypy
        run: uv run mypy app/

  # ─────────────────────────────────────────────
  # Unit tests (no external services)
  # ─────────────────────────────────────────────
  test-unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run unit tests
        run: uv run pytest tests/unit -v --tb=short
        env:
          ENVIRONMENT: test
          DEBUG: "false"
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
          POSTGRES_PORT: "5432"
          QDRANT_SERVICE_API_KEY: test
          QDRANT_SERVICE_READ_ONLY_API_KEY: test
          QDRANT_SERVICE_HTTP_PORT: "6333"
          QDRANT_SERVICE_GRPC_PORT: "6334"

  # ─────────────────────────────────────────────
  # Integration tests (postgres + qdrant)
  # ─────────────────────────────────────────────
  test-integration:
    name: Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      qdrant:
        image: qdrant/qdrant:v1.13.6
        ports:
          - 6333:6333
          - 6334:6334
        options: >-
          --health-cmd "curl -sf http://localhost:6333/healthz"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run DB migrations
        run: uv run alembic upgrade head
        env:
          ENVIRONMENT: test
          DEBUG: "false"
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
          POSTGRES_PORT: "5432"
          QDRANT_SERVICE_API_KEY: test
          QDRANT_SERVICE_READ_ONLY_API_KEY: test
          QDRANT_SERVICE_HTTP_PORT: "6333"
          QDRANT_SERVICE_GRPC_PORT: "6334"

      - name: Run integration tests
        run: uv run pytest tests/integration -v --tb=short
        env:
          ENVIRONMENT: test
          DEBUG: "false"
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
          POSTGRES_PORT: "5432"
          QDRANT_SERVICE_API_KEY: test
          QDRANT_SERVICE_READ_ONLY_API_KEY: test
          QDRANT_SERVICE_HTTP_PORT: "6333"
          QDRANT_SERVICE_GRPC_PORT: "6334"

  # ─────────────────────────────────────────────
  # Docker build check
  # ─────────────────────────────────────────────
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: prod
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
